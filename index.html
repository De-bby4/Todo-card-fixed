<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card — Stage 1a</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <article data-testid="test-todo-card" class="card" id="todo-card">

    <!-- ========== VIEW MODE ========== -->
    <div id="view-mode">

      <div class="card-header">
        <div class="header-row">
          <div class="title-group">
            <span
              data-testid="test-todo-priority-indicator"
              id="priority-indicator"
              class="priority-dot"
              aria-hidden="true"
            ></span>

            <h3 data-testid="test-todo-title" id="display-title"></h3>
          </div>

          <span
            data-testid="test-todo-priority"
            id="display-priority"
            class="priority-badge"
            aria-label="Priority"
          ></span>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="card-body">

        <div
          data-testid="test-todo-collapsible-section"
          id="collapsible-section"
          class="collapsible collapsed"
        >
          <p
            data-testid="test-todo-description"
            id="display-desc"
          ></p>
        </div>

        <button
          type="button"
          data-testid="test-todo-expand-toggle"
          id="expand-toggle-btn"
          class="expand-toggle"
          aria-expanded="false"
          aria-controls="collapsible-section"
        >
          <span id="expand-label">Show more</span>
          <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>

        <div class="meta">
          <div class="meta-row">
            <svg class="meta-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>

            <time data-testid="test-todo-due-date" id="display-due"></time>
          </div>

          <div class="meta-row">
            <svg class="meta-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
              <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>

            <time
              data-testid="test-todo-time-remaining"
              id="time-remaining"
              aria-live="polite"
            ></time>

            <span
              data-testid="test-todo-overdue-indicator"
              id="overdue-indicator"
              class="overdue-badge hidden"
              aria-live="polite"
              aria-atomic="true"
            >
              Overdue
            </span>
          </div>
        </div>

        <div class="status-row">
          <div class="status-left">
            <div class="status-dot" id="status-dot" aria-hidden="true"></div>

            <span
              data-testid="test-todo-status"
              id="status-display"
              class="status-text"
              aria-label="Status"
            ></span>
          </div>

          <div class="status-right">

            <label for="status-control" class="visually-hidden">Status</label>
            <select
              data-testid="test-todo-status-control"
              id="status-control"
              class="status-select"
            >
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>

            <label class="toggle-wrap">
              <input
                type="checkbox"
                id="complete-toggle"
                data-testid="test-todo-complete-toggle"
              />
              <span>Mark as done</span>
            </label>

          </div>
        </div>

        <ul data-testid="test-todo-tags" class="tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li>design</li>
        </ul>

      </div>

      <div class="card-footer">
        <button
          type="button"
          data-testid="test-todo-edit-button"
          id="edit-btn"
          class="btn btn-secondary"
        >Edit</button>

        <button
          type="button"
          data-testid="test-todo-delete-button"
          id="delete-btn"
          class="btn btn-danger"
        >Delete</button>
      </div>

    </div>

    <!-- ========== EDIT MODE ========== -->
    <form
      id="edit-mode"
      data-testid="test-todo-edit-form"
      class="edit-form hidden"
    >

      <div class="field">
        <label for="edit-title-input">Title</label>
        <input id="edit-title-input" data-testid="test-todo-edit-title-input" />
      </div>

      <div class="field">
        <label for="edit-desc-input">Description</label>
        <textarea id="edit-desc-input" data-testid="test-todo-edit-description-input"></textarea>
      </div>

      <div class="field">
        <label for="edit-priority-select">Priority</label>
        <select id="edit-priority-select" data-testid="test-todo-edit-priority-select">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>

      <div class="field">
        <label for="edit-due-date-input">Due date</label>
        <input type="datetime-local" id="edit-due-date-input" data-testid="test-todo-edit-due-date-input" />
      </div>

      <div class="edit-footer">
        <button type="submit" data-testid="test-todo-save-button">Save</button>
        <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
      </div>

    </form>

  </article>

  <script src="script.js"></script>
</body>
</html>
